name: Erstelle Installer für Mac und Windows

on:
  push:
    branches: [ main ]

jobs:
  # JOB 1: Baut die Version für den Mac
  build-macos:
    runs-on: macos-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4
    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: PyInstaller & Module installieren
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6
    - name: App kompilieren
      run: |
        pyinstaller --windowed --onefile Glash2.0.py
    - name: DMG Installer manuell erstellen
      run: |
        mkdir dmg_root
        cp -R dist/Glash2.0.app dmg_root/
        hdiutil create -volname "GlashInstaller" -srcfolder dmg_root -ov -format UDZO GlashInstaller.dmg
    - name: DMG als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: Mac-DMG-Installer
        path: GlashInstaller.dmg

  # JOB 2: Baut die Version für Windows
  build-windows:
    runs-on: windows-latest # GitHub startet einen Windows-Server
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4
    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: PyInstaller & Module installieren
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6
    - name: EXE kompilieren
      run: |
        pyinstaller --noconsole --onefile Glash2.0.py
    - name: EXE als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: Windows-EXE-Installer
        path: dist/Glash2.0.exe
