name: Erstelle Installer für Glash Browser 2.0

on:
  push:
    branches: [ main ]

jobs:
  # JOB 1: Baut die Version für macOS
  build-macos:
    runs-on: macos-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: PyInstaller & Module installieren
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 PyQt6-WebEngine

    - name: App kompilieren
      run: |
        pyinstaller --windowed --onefile Glash2.0.py

    - name: DMG Installer manuell erstellen
      run: |
        mkdir dmg_root
        cp -R dist/Glash2.0.app dmg_root/
        hdiutil create -volname "GlashBrowserInstaller" -srcfolder dmg_root -ov -format UDZO Glash2.0.dmg

    - name: DMG als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: Glash-Mac-DMG
        path: Glash2.0.dmg

  # JOB 2: Baut die Version für Windows
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: PyInstaller & Module installieren
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 PyQt6-WebEngine

    - name: EXE kompilieren
      run: |
        pyinstaller --noconsole --onefile Glash2.0.py

    - name: EXE als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: Glash-Windows-EXE
        path: dist/Glash2.0.exe
